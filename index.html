<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리 타기 확률 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        /* 설정 영역 */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        .btn-wrapper {
            display: flex;
            align-items: flex-end;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        /* 결과 뷰포트 (그래프 및 표) */
        .result-section {
            display: none; /* 초기에는 숨김 */
            margin-top: 20px;
        }
        .content-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
        }
        .chart-container {
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            min-height: 350px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .highlight {
            font-weight: bold;
            color: #e74c3c;
        }
        /* 하단 푸터 영역 스타일 */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 15px;
            color: #7f8c8d;
            border-top: 1px solid #dcdde1;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🪜 사다리 타기 확률 시뮬레이터</h1>
    <div class="description">출발점 개수, 사다리 높이, 실행 횟수 및 꽝의 위치를 지정하여 실험할 수 있습니다.</div>
    
    <div class="setup-grid">
        <div class="input-group">
            <label for="nodeCount">출발점/도착점 개수</label>
            <input type="number" id="nodeCount" value="5" min="2" max="30" onchange="updateMaxFailIndex()">
        </div>
        <div class="input-group">
            <label for="failPosition">꽝의 위치 (도착지 번호)</label>
            <input type="number" id="failPosition" value="1" min="1" max="5">
        </div>
        <div class="input-group">
            <label for="ladderHeight">사다리 줄 개수 (높이)</label>
            <input type="number" id="ladderHeight" value="10" min="1" max="100">
        </div>
        <div class="input-group">
            <label for="trialCount">시뮬레이션 실행 횟수</label>
            <input type="number" id="trialCount" value="5000" min="1" max="100000">
        </div>
        <div class="btn-wrapper">
            <button onclick="runSimulation()">시뮬레이션 시작</button>
        </div>
    </div>

    <div class="result-section" id="resultSection">
        <h2 id="resultTitle">📊 시뮬레이션 결과 분석</h2>
        <div class="content-layout">
            <div class="chart-container">
                <canvas id="probabilityChart"></canvas>
            </div>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>출발점</th>
                            <th>'꽝' 당첨 횟수</th>
                            <th>당첨 확률</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    대구광역시 달서교육지원청 영재교육원 R&E
</footer>

<script>
let currentChart = null;

// 출발점 개수가 바뀌면 꽝의 위치 최대값(max)도 자동으로 동기화되는 함수
function updateMaxFailIndex() {
    const nodeCount = document.getElementById('nodeCount').value;
    const failPositionInput = document.getElementById('failPosition');
    failPositionInput.max = nodeCount;
    
    // 만약 현재 입력된 꽝의 위치가 새로운 최대값보다 크다면 최대값으로 강제 조정
    if (parseInt(failPositionInput.value) > parseInt(nodeCount)) {
        failPositionInput.value = nodeCount;
    }
}

function runSimulation() {
    const numLines = parseInt(document.getElementById('nodeCount').value);
    const failPosition = parseInt(document.getElementById('failPosition').value);
    const ladderHeight = parseInt(document.getElementById('ladderHeight').value);
    const trials = parseInt(document.getElementById('trialCount').value);

    // 예외 처리 유효성 검사
    if (isNaN(numLines) || numLines < 2) { alert('출발점은 최소 2개 이상이어야 합니다.'); return; }
    if (isNaN(failPosition) || failPosition < 1 || failPosition > numLines) { 
        alert(`꽝의 위치는 1번부터 ${numLines}번 사이여야 합니다.`); 
        return; 
    }
    if (isNaN(ladderHeight) || ladderHeight < 1) { alert('사다리 높이는 1 이상이어야 합니다.'); return; }
    if (isNaN(trials) || trials <= 0) { alert('실행 횟수를 올바르게 입력해주세요.'); return; }

    // 컴퓨터 인덱스는 0부터 시작하므로 사용자가 입력한 번호에서 1을 뺍니다.
    const failIndex = failPosition - 1; 
    let failCounts = new Array(numLines).fill(0); 

    // 대량 시뮬레이션 루프 수행
    for (let t = 0; t < trials; t++) {
        let ladder = [];
        for (let h = 0; h < ladderHeight; h++) {
            let row = new Array(numLines - 1).fill(false);
            for (let i = 0; i < numLines - 1; i++) {
                if (i > 0 && row[i-1]) {
                    row[i] = false; 
                } else {
                    row[i] = Math.random() < 0.5; 
                }
            }
            ladder.push(row);
        }

        for (let start = 0; start < numLines; start++) {
            let currentLine = start;
            for (let h = 0; h < ladderHeight; h++) {
                if (currentLine < numLines - 1 && ladder[h][currentLine]) {
                    currentLine++;
                } else if (currentLine > 0 && ladder[h][currentLine - 1]) {
                    currentLine--;
                }
            }
            // 최종 도착지가 사용자가 지정한 꽝의 인덱스와 일치하는지 확인
            if (currentLine === failIndex) {
                failCounts[start]++;
            }
        }
    }

    // 결과 제목 업데이트
    document.getElementById('resultTitle').innerText = `📊 시뮬레이션 결과 분석 (도착지: ${failPosition}번 위치가 '꽝')`;

    // 화면에 데이터 테이블(표) 업데이트
    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = ''; 

    let chartLabels = [];
    let chartData = [];

    for (let i = 0; i < numLines; i++) {
        const percentage = ((failCounts[i] / trials) * 100).toFixed(2);
        chartLabels.push(`${i + 1}번 출발점`);
        chartData.push(percentage);

        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${i + 1}번</strong></td>
            <td class="highlight">${failCounts[i].toLocaleString()} 회</td>
            <td>${percentage} %</td>
        `;
        resultBody.appendChild(row);
    }

    // Chart.js 그래프 업데이트
    const ctx = document.getElementById('probabilityChart').getContext('2d');
    if (currentChart) {
        currentChart.destroy();
    }

    currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: `${failPosition}번 도착지(꽝)에 걸릴 확률 (%)`,
                data: chartData,
                backgroundColor: 'rgba(52, 152, 219, 0.7)',
                borderColor: 'rgba(41, 128, 185, 1)',
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: '확률 (%)', font: { weight: 'bold' } }
                }
            },
            plugins: {
                legend: { position: 'top' }
            }
        }
    });

    document.getElementById('resultSection').style.display = 'block';
}
</script>

</body>
</html>
