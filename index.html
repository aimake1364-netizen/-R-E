<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사다리 타기 확률 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        /* 설정 영역 크기 및 레이아웃 조절 */
        .setup-container {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        /* 꽝 위치 선택지 라디오 버튼 그룹 스타일 */
        .radio-group-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #ffffff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #dcdde1;
        }
        .radio-group-container label.group-title {
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }
        .radio-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 15px;
            background: #f8f9fa;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #ced4da;
            transition: all 0.2s;
        }
        .radio-label:hover {
            background: #e9ecef;
        }
        .radio-label input[type="radio"]:checked + span {
            font-weight: bold;
            color: #e74c3c;
        }
        .btn-wrapper {
            margin-top: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        /* 결과 뷰포트 (그래프 및 표) */
        .result-section {
            display: none;
            margin-top: 20px;
        }
        .content-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .content-layout {
                grid-template-columns: 1fr;
            }
        }
        .chart-container {
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            min-height: 350px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .highlight {
            font-weight: bold;
            color: #e74c3c;
        }
        /* 하단 푸터 영역 스타일 */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 15px;
            color: #7f8c8d;
            border-top: 1px solid #dcdde1;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🪜 사다리 타기 확률 시뮬레이터</h1>
    <div class="description">출발점 개수, 사다리 높이, 실행 횟수 및 꽝의 위치를 지정하여 실험할 수 있습니다.</div>
    
    <div class="setup-container">
        <div class="setup-grid">
            <div class="input-group">
                <label for="nodeCount">출발점/도착점 개수</label>
                <input type="number" id="nodeCount" value="5" min="2" max="30" oninput="renderFailRadioButtons()">
            </div>
            <div class="input-group">
                <label for="ladderHeight">사다리 줄 개수 (높이)</label>
                <input type="number" id="ladderHeight" value="10" min="1" max="100">
            </div>
            <div class="input-group">
                <label for="trialCount">시뮬레이션 실행 횟수</label>
                <input type="number" id="trialCount" value="5000" min="1" max="100000">
            </div>
        </div>

        <div class="radio-group-container">
            <label class="group-title">🎯 꽝의 위치 선택 (도착지 번호)</label>
            <div id="radioOptionsWrapper" class="radio-options">
                </div>
        </div>

        <div class="btn-wrapper">
            <button onclick="runSimulation()">시뮬레이션 시작</button>
        </div>
    </div>

    <div class="result-section" id="resultSection">
        <h2 id="resultTitle">📊 시뮬레이션 결과 분석</h2>
        <div class="content-layout">
            <div class="chart-container">
                <canvas id="probabilityChart"></canvas>
            </div>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>출발점</th>
                            <th>'꽝' 당첨 횟수</th>
                            <th>당첨 확률</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    대구광역시 달서교육지원청 영재교육원 R&E
</footer>

<script>
let currentChart = null;

// 페이지가 처음 열릴 때 선택지를 만들어주기 위한 초기 실행
window.onload = function() {
    renderFailRadioButtons();
};

// 출발점 개수에 따라 라디오 버튼 선택지를 화면에 다시 그려주는 함수
function renderFailRadioButtons() {
    const numLines = parseInt(document.getElementById('nodeCount').value);
    const wrapper = document.getElementById('radioOptionsWrapper');
    
    // 현재 선택되어 있던 값을 임시 기억 (개수가 바뀌어도 선택 유지 유도용)
    const checkedRadio = document.querySelector('input[name="failPosRadio"]:checked');
    let previousValue = checkedRadio ? parseInt(checkedRadio.value) : 1;

    // 만약 이전 선택값이 바뀐 최대 범위를 넘어서면 1번으로 초기화
    if (previousValue > numLines || previousValue < 1) {
        previousValue = 1;
    }

    wrapper.innerHTML = ''; // 기존 선택지 초기화

    // 1번부터 설정된 출발점 개수만큼 동적으로 선택지 라디오 생성
    for (let i = 1; i <= numLines; i++) {
        const isChecked = (i === previousValue) ? 'checked' : '';
        const labelText = `
            <label class="radio-label">
                <input type="radio" name="failPosRadio" value="${i}" ${isChecked}>
                <span>${i}번</span>
            </label>
        `;
        wrapper.insertAdjacentHTML('beforeend', labelText);
    }
}

function runSimulation() {
    const numLines = parseInt(document.getElementById('nodeCount').value);
    const ladderHeight = parseInt(document.getElementById('ladderHeight').value);
    const trials = parseInt(document.getElementById('trialCount').value);

    // 라디오 버튼 그룹에서 사용자가 체크한 항목의 value(꽝의 번호) 가져오기
    const selectedRadio = document.querySelector('input[name="failPosRadio"]:checked');
    if (!selectedRadio) {
        alert('꽝의 위치를 선택해주세요.');
        return;
    }
    const failPosition = parseInt(selectedRadio.value);

    // 예외 처리 유효성 검사
    if (isNaN(numLines) || numLines < 2) { alert('출발점은 최소 2개 이상이어야 합니다.'); return; }
    if (isNaN(ladderHeight) || ladderHeight < 1) { alert('사다리 높이는 1 이상이어야 합니다.'); return; }
    if (isNaN(trials) || trials <= 0) { alert('실행 횟수를 올바르게 입력해주세요.'); return; }

    // 컴퓨터 연산용 0배이스 인덱스 변환
    const failIndex = failPosition - 1; 
    let failCounts = new Array(numLines).fill(0); 

    // 시뮬레이션 계산 로직
    for (let t = 0; t < trials; t++) {
        let ladder = [];
        for (let h = 0; h < ladderHeight; h++) {
            let row = new Array(numLines - 1).fill(false);
            for (let i = 0; i < numLines - 1; i++) {
                if (i > 0 && row[i-1]) {
                    row[i] = false; 
                } else {
                    row[i] = Math.random() < 0.5; 
                }
            }
            ladder.push(row);
        }

        for (let start = 0; start < numLines; start++) {
            let currentLine = start;
            for (let h = 0; h < ladderHeight; h++) {
                if (currentLine < numLines - 1 && ladder[h][currentLine]) {
                    currentLine++;
                } else if (currentLine > 0 && ladder[h][currentLine - 1]) {
                    currentLine--;
                }
            }
            if (currentLine === failIndex) {
                failCounts[start]++;
            }
        }
    }

    // 분석 타이틀 및 표 화면 반영
    document.getElementById('resultTitle').innerText = `📊 시뮬레이션 결과 분석 (도착지: ${failPosition}번 위치가 '꽝')`;

    const resultBody = document.getElementById('resultBody');
    resultBody.innerHTML = ''; 

    let chartLabels = [];
    let chartData = [];

    for (let i = 0; i < numLines; i++) {
        const percentage = ((failCounts[i] / trials) * 100).toFixed(2);
        chartLabels.push(`${i + 1}번 출발점`);
        chartData.push(percentage);

        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${i + 1}번</strong></td>
            <td class="highlight">${failCounts[i].toLocaleString()} 회</td>
            <td>${percentage} %</td>
        `;
        resultBody.appendChild(row);
    }

    // Chart.js 그래프 반영
    const ctx = document.getElementById('probabilityChart').getContext('2d');
    if (currentChart) {
        currentChart.destroy();
    }

    currentChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: chartLabels,
            datasets: [{
                label: `${failPosition}번 도착지(꽝)에 도달할 확률 (%)`,
                data: chartData,
                backgroundColor: 'rgba(52, 152, 219, 0.7)',
                borderColor: 'rgba(41, 128, 185, 1)',
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: '확률 (%)', font: { weight: 'bold' } }
                }
            },
            plugins: {
                legend: { position: 'top' }
            }
        }
    });

    document.getElementById('resultSection').style.display = 'block';
}
</script>

</body>
</html>
